<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>WBGT at Woodlands (Live)</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 2rem; }
    #wbgt { font-size: 3rem; margin: 1rem 0; }
    #level { font-size: 2rem; font-weight: bold; }
    .low { color: green; }
    .moderate { color: orange; }
    .high { color: red; }
  </style>
</head>
<body>
  <h1>WBGT at Woodlands (Live)</h1>
  <div id="wbgt">Loading…</div>
  <div id="level"></div>

  <script>
    async function fetchWBGTAtWoodlands() {
      try {
        const response = await fetch("https://api.data.gov.sg/v1/environment/wbgt");
        const json = await response.json();

        // 'items' holds the array of time slices; take the most recent one
        const latestData = json.items[0];
        const readings = latestData?.readings || [];

        // Filter for station ID S125 (Woodlands Street 13)
        const station = readings.find(r => r.station_id === "S125");

        if (!station) {
          document.getElementById("wbgt").innerText = "No Woodlands reading yet";
          document.getElementById("level").innerText = "";
          return;
        }

        const value = station.value;
        document.getElementById("wbgt").innerText = value.toFixed(1) + " °C WBGT";

        let text, cls;
        if (value < 31)      { text = "Low Heat Stress";      cls = "low"; }
        else if (value < 33) { text = "Moderate Heat Stress"; cls = "moderate"; }
        else                  { text = "High Heat Stress";     cls = "high"; }

        const levelDiv = document.getElementById("level");
        levelDiv.innerText = text;
        levelDiv.className = cls;

      } catch (err) {
        document.getElementById("wbgt").innerText = "Error retrieving data";
        document.getElementById("level").innerText = "";
        console.error(err);
      }
    }

    // Initial fetch + automatic refresh every 15 minutes
    fetchWBGTAtWoodlands();
    setInterval(fetchWBGTAtWoodlands, 15 * 60 * 1000);
  </script>
</body>
</html>
