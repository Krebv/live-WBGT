<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>WBGT at Woodlands Stadium (Live)</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 2rem; }
    #wbgt { font-size: 3rem; margin: 1rem 0; }
    #level { font-size: 2rem; font-weight: bold; }
    .low { color: green; }
    .moderate { color: orange; }
    .high { color: red; }
  </style>
</head>
<body>
  <h1>WBGT at Woodlands Stadium (Live)</h1>
  <div id="wbgt">Loading…</div>
  <div id="level"></div>

  <script>
    async function fetchWBGTForWoodlands() {
      try {
        // Fetch real-time WBGT observations
        const resp = await fetch("https://api.data.gov.sg/v1/environment/wbgt");
        const data = await resp.json();
        const items = data.items[0];
        const readings = items?.readings || [];

        // Find the reading for Woodlands Stadium / Woodlands Street 13
        const record = readings.find(r => r.station_id === "S125" || r.station_name?.includes("Woodlands"));
        if (!record) {
          document.getElementById("wbgt").innerText = "No Woodlands data";
          document.getElementById("level").innerText = "";
          return;
        }

        const latest = record.value;
        document.getElementById("wbgt").innerText = latest.toFixed(1) + " °C";

        // Determine heat stress
        let levelText, className;
        if (latest < 31)      { levelText = "Low Heat Stress";      className = "low"; }
        else if (latest < 33) { levelText = "Moderate Heat Stress"; className = "moderate"; }
        else                  { levelText = "High Heat Stress";     className = "high"; }

        const levelDiv = document.getElementById("level");
        levelDiv.innerText = levelText;
        levelDiv.className = className;
      } catch (err) {
        document.getElementById("wbgt").innerText = "Error retrieving data";
        document.getElementById("level").innerText = "";
        console.error(err);
      }
    }

    fetchWBGTForWoodlands();
    setInterval(fetchWBGTForWoodlands, 15 * 60 * 1000); // Refresh every 15 minutes
  </script>
</body>
</html>
