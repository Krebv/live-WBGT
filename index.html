<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>WBGT at Woodlands (Live)</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 2rem; }
    #wbgt { font-size: 3rem; margin: 1rem 0; }
    #level { font-size: 2rem; font-weight: bold; }
    .low { color: green; }
    .moderate { color: orange; }
    .high { color: red; }
  </style>
</head>
<body>
  <h1>WBGT — Woodlands (Live)</h1>
  <div id="wbgt">Loading…</div>
  <div id="level"></div>

  <script>
    async function findLatestWBGT() {
      try {
        // Try up to 5 intervals (past ~75 mins)
        let found = null;
        const now = new Date();
        for (let i = 0; i < 5; i++) {
          const dt = new Date(now.getTime() - i * 15 * 60000);
          const sgt = dt.toISOString().split('.')[0]; // format "YYYY-MM-DDTHH:MM:SS"
          const resp = await fetch(`https://api.data.gov.sg/v1/environment/wbgt?date_time=${sgt}`);
          const json = await resp.json();
          const items = json.items || [];
          if (items.length === 0) continue;
          const readings = items[0].readings || [];
          const station = readings.find(r => r.station_id === "S125");
          if (station && station.value !== null) {
            found = { value: station.value, timestamp: items[0].timestamp };
            break;
          }
        }

        if (!found) {
          document.getElementById("wbgt").innerText = "No recent Woodlands data";
          document.getElementById("level").innerText = "";
          return;
        }

        const value = found.value;
        document.getElementById("wbgt").innerText = value.toFixed(1) + " °C";

        let text, cls;
        if (value < 31)      { text = "Low Heat Stress";      cls = "low"; }
        else if (value < 33) { text = "Moderate Heat Stress"; cls = "moderate"; }
        else                  { text = "High Heat Stress";     cls = "high"; }

        const levelDiv = document.getElementById("level");
        levelDiv.innerText = text + " — " + found.timestamp;
        levelDiv.className = cls;

      } catch (err) {
        document.getElementById("wbgt").innerText = "Error retrieving data";
        document.getElementById("level").innerText = "";
        console.error(err);
      }
    }

    findLatestWBGT();
    setInterval(findLatestWBGT, 15 * 60 * 1000);
  </script>
</body>
</html>
